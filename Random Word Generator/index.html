<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <title>Random Word Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold p-3 text-center rounded-2 mb-3">Random Word Generator</h1>

        <section class="info p-5 rounded-2 text-center">
            <h3 id="word" class="fw-semibold mb-3">Click the button to get a word</h3>
            <h5 id="meaning" class="fw-semibold mb-3"></h5>
            <button id="generateBtn" class="border-0 p-3 rounded-2">Generate Word</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
