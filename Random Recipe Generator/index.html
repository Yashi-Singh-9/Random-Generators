<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>Random Recipe Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <section class="header p-3 rounded-3 mb-4">
            <h1 class="text-center my-auto fw-bold">Random Recipe Generator</h1>
        </section>

        <section class="recipe-container rounded-3 overflow-hidden p-4" id="recipeContainer">
            <button onclick="getRecipe()" class="rounded-3 py-3 px-5 fw-semibold border-0 text-white d-block float-end mb-3">Get New Recipe</button>
            <img id="mealImg" class="recipe-image object-fit-cover rounded-3 mb-4 img-fulid" src="" alt="" />
            <h2 id="mealName"></h2>
            <h3>Ingredients</h3>
            <ul id="ingredients" class="ingredients"></ul>
            <h3>Instructions</h3>
            <p id="instructions"></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
