<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>Random Cocktail Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold text-center mb-3 rounded-2 p-2 text-white">Random Cocktail Generator</h1>
        <button onclick="getRandomCocktail()" class="d-block mx-auto py-2 px-5 rounded-2 border-0 fs-5 fw-semibold mb-3">Get Random Cocktail</button>

        <section class="card p-4 rounded-3" id="cocktailCard" style="display: none;">
            <h2 class="cocktail-name fw-bold mb-3" id="cocktailName"></h2>
            <img id="cocktailImage" class="cocktail-img img-fluid rounded-3 mb-3 mx-auto d-block" src="" alt="Cocktail Image" />
            <div class="ingredients mb-3">
                <h4 class="fw-bold mb-3">Ingredients:</h4>
                <ul id="ingredientsList"></ul>
            </div>
            <div class="instructions mb-3" id="instructions"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
