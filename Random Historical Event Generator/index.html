<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>Random Historical Event Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold text-center p-2 rounded-2 mb-3">Random Historical Event</h1>
        <button onclick="getRandomEvent()" class="py-2 px-5 rounded-2 border-0 fw-semibold d-block mx-auto mb-3">Get Random Event</button>

        <div class="card p-3 rounded-2" id="eventCard" style="display: none;">
            <h3 class="event-year fw-bold mb-2" id="eventYear"></h3>
            <div class="event-text" id="eventText"></div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
