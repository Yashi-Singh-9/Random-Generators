<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>Random Cat or Dog Image Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="p-3 rounded-2 text-center fw-bold mb-3">Random Cat or Dog Image Generator 🐱🐶</h1>

        <div class="btns d-flex flex-wrap justify-content-center gap-3">
            <button id="catBtn" class="rounded-2 py-2 px-5 fw-semibold border-0">Show Random Cat 🐱</button>
            <button id="dogBtn" class="rounded-2 py-2 px-5 fw-semibold border-0 text-white">Show Random Dog 🐶</button>
        </div>

        <div id="imageContainer" class="mt-4 overflow-hidden rounded-4">
            <p class="fw-semibold text-center fs-3 rounded-2 p-2">No image yet. Click a button!</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
