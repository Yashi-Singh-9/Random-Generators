<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
     
    <title>Random Urban Dictionary Word Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold text-center mb-4 rounded-3 text-white p-2">Random Urban Dictionary Word</h1>
        <button onclick="getRandomWord()" class="d-block mx-auto py-2 px-5 rounded-3 fw-semibold border-0 text-white mb-4">Get Random Word</button>

        <div class="card p-4 rounded-3" id="wordCard" style="display: none;">
            <h3 class="word" id="word"></h3>
            <p class="definition mb-3" id="definition"></p>
            <a href="#" target="_blank" id="permalink" class="fw-medium">View on Urban Dictionary</a>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
