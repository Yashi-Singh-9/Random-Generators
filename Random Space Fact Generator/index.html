<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <title>Random Space Fact Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
          <h1 class="fw-bold mb-2 rounded-2 p-3 text-center">🚀 Random Space Fact Generator</h1>

        <div id="fact-box" class="fact-box rounded-2 p-4 text-center overflow-hidden">
            <img id="space-image" src="" alt="Astronomy Picture of the Day" style="display: none;" class="img-fluid rounded-2 mb-3 object-fit-cover">
            <p id="space-fact" class="fs-4">Click the button to learn a cool space fact!</p>
            <button id="generate-fact" class="border-0 p-3 rounded-2 fw-semibold mb-4">Generate Space Fact</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
