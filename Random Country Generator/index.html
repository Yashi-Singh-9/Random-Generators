<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <title>Random Country Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold mb-3 rounded-2 text-center p-2">Random Country</h1>
        <button onclick="getRandomCountry()" class="fw-semibold d-block mx-auto py-3 px-5 rounded-2 border-0 text-white mb-3">Get Random Country</button>

        <div class="card p-3 rounded-2 text-center" id="countryCard" style="display: none;">
            <h3 class="country-name fw-bold mb-3" id="countryName"></h3>
            <img id="flag" class="flag mb-3" src="" alt="Country Flag"/>
            <p class="fact" id="fact1"></p>
            <p class="fact" id="fact2"></p>
            <p class="fact" id="fact3"></p>
            <p class="fact" id="fact4"></p>
            <p class="fact" id="fact5"></p>
            <p class="fact"><a id="mapLink" href="#" target="_blank" class="fw-medium">View on Map</a></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
