<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>Random Bird Fact Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold text-center mb-3 rounded-3 p-3">Random Bird Fact</h1>

        <section class="fact-container text-center p-5 rounded-3">
            <h4 id="fact" class="fw-medium mb-3">Click the button to get a bird fact!</h4>
            <button onclick="getBirdFact()" class="py-3 px-5 rounded-3 border-0 fw-semibold text-white">Get Fact</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
