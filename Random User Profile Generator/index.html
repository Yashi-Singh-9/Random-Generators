<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>Random User Profile Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="text-center fw-bold m-auto p-3 rounded-3 mb-4">Random User Profile Generator</h1>

        <div class="profile-card p-5 rounded-3 text-center" id="profile">

            <img src="" alt="User Avatar" id="avatar" class="avatar rounded-circle img-fluid mx-auto object-fit-cover d-block mb-4"/>
            <h2 id="name"></h2>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Phone:</strong> <span id="phone"></span></p>
            <p class="mb-5"><strong>Location:</strong> <span id="location"></span></p>
        
            <button id="generate" class="px-5 py-3 rounded-3 border-0 fw-semibold">Generate New User</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
