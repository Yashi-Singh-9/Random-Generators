<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">

    <title>Random Wikipedia Article Preview</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="text-center p-2 rounded-2 mb-3 fw-bold">Random Wikipedia Article Preview</h1>
        <button onclick="getRandomWiki()" class="py-2 px-5 rounded-2 d-block mx-auto border-0 fw-semibold mb-3">Get Random Article</button>

        <div class="card p-3 rounded-3" id="articleCard" style="display: none;">
            <h3 class="title fw-bold mb-3" id="articleTitle"></h3>
            <p class="snippet mb-3" id="articleSnippet"></p>
            <a class="link" id="articleLink" href="#" target="_blank">Read more on Wikipedia</a>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
