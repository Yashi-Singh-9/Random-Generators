<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <title>Random Planet or Celestial Body Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold mb-3 rounded-2 p-3 text-center text-white">Random Planet or Celestial Body Generator</h1>

        <div id="planet-info" class="planet-info rounded-2 p-5">
            <p><strong>Name:</strong> <span id="name"></span></p>
            <p><strong>Type:</strong> <span id="type"></span></p>
            <p><strong>Mass:</strong> <span id="mass"></span> kg</p>
            <p><strong>Diameter:</strong> <span id="diameter"></span> km</p>
            <p><strong>Distance from Star:</strong> <span id="distance"></span> million km</p>
            <button id="generate-btn" class="border-0 rounded-2 d-block mx-auto mt-5 p-3 fw-semibold">Generate Random Planet</button>
        </div>        
    </main>

    <script src="script.js"></script>
</body>
</html>
