<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    
    <title>Random Book Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold mb-3 p-2 rounded-2 text-center text-white">Random Book Generator</h1>
        <button onclick="getRandomBook()" class="d-block mx-auto py-2 px-5 rounded-2 border-0 text-white fw-semibold mb-3">Get Random Book</button>

        <div class="card rounded-2 p-4 text-center" id="bookCard" style="display: none;">
            <h2 class="book-title fw-bold mb-3" id="bookTitle"></h2>
            <img id="bookImage" src="" alt="Book Cover" class="img-fuild rounded-2 mb-3">
            <p class="book-author" id="bookAuthor"></p>
            <p class="book-details" id="bookDetails"></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
