<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">

    <title>Random Painting Generator</title>
</head>
<body>
    <main class="mx-auto mb-5">
        <h1 class="fw-bold mb-3 rounded-2 p-2 text-center">Random Painting Generator</h1>
        <button onclick="getRandomPainting()" class="d-block mx-auto mb-3 rounded-2 border-0 py-2 px-4 fw-semibold text-white">Get Random Painting</button>

        <div class="card p-4 rounded-2 text-center" id="artCard" style="display: none;">
            <h2 class="art-title mb-3 fw-bold" id="artTitle"></h2>
            <img id="artImage" src="" alt="Artwork Image" class="rounded-2 mb-3 img-fluid">
            <p class="art-details" id="artArtist"></p>
            <p class="art-details" id="artDate"></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
